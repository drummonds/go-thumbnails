version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Test tasks
  test:
    desc: Run all Go tests
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test -v -cover -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  # Code quality
  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  # Dependency management
  deps:tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  deps:update:
    desc: Update dependencies
    cmds:
      - go get -u ./...
      - go mod tidy

  # Install
  install:
    desc: Install thumbnails CLI
    cmds:
      - go install ./cmd/thumbnails

  # Combined checks
  check:
    desc: Run all checks (fmt, vet, test)
    cmds:
      - task: fmt
      - task: vet
      - task: test

  # Documentation
  docs:build:
    desc: Build documentation
    cmds:
      - go run ./cmd/gendocimages -output docs/images
      - task-plus md2html --file index.md --dst docs
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file gallery.md --dst docs
      - task-plus md2html --file commands.md --dst docs
      - task-plus md2html --index --dst docs --project go-thumbnails

  # Clean
  clean:
    desc: Clean generated files
    cmds:
      - rm -f coverage.out coverage.html
      - echo "Cleaned generated files"

